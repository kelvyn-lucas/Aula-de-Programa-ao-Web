<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java e Script</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3">
                <!-- menu -->
            </div>
            <div class="col-md-9 p-5">
                <h1>Pagina com JavaScript</h1>
                <section class="p-2 border">
                    <h2>exibir Data ao passar o mouse no botão</h2>
                    <button class="btn btn-primary" onmouseover="document.getElementById('datahora').innerHTML = Date()" 
                    onmouseout="document.getElementById('datahora').innerHTML = ''">
                        Passe o mouse AQUI e veja a data e hora atual
                    </button>
                    <p id="datahora"></p>
                </section>
                <section class="mt-3 p-2 border bg-light">
                    <h2>JavaScript carregado via tag script</h2>
                    <p id="p1">
                        A ação do botão foi programado na tag script ao fim do body
                    </p>

                    <button class="btn btn-outline-primary" onclick="copiaparagrafo()">
                        Clique aqui para replicar o paragrafo acima
                    </button>

                    <p id="p2">
                        O Texto é muito tesão
                    </p>
                </section>
                <section class="mt-3 p-2 border">
                    <h2>Editando o src(sorce) de uma imagem com JS</h2>
                    <div class="col">
                        <h3>Versão 1 Botães</h3>
                        <button class="btn btn-success" onclick="ligar()">
                            Ligar
                        </button>
                        <img id="RD350" src="img/RD350.jpg" alt="RD350 desligada">
                        <button class="btn btn-danger" onclick="desliga()">
                            Desliga
                        </button>
                    </div>
                   
                </section>
                    <section  class="mt-3 p-2 border">
                        <div class="col">
                            <h3>Versão 2 botão On/Off</h3>
                            <button class="btn btn-success" onclick="onoff()">
                                On/Off
                            </button>
                            <img id="peterParado" src="img/peter-griffin-parado.jpg" alt="peter-griffin-parado">
                    </section>
                </div>
            </div>
        </div>

    </div>
</body>
<script>
    function copiaparagrafo(){
        let texto = document.getElementById('p1').innerHTML;
        console.log(texto);
        document.getElementById('p2').innerHTML = texto;
    }
</script>
<script src="js/meuscript.js"></script>
</html>
