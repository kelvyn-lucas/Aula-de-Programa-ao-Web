<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
    /* classe custom para o background */
    body {
      /* substitua pelo caminho da sua imagem */
      /*background-image: url(https://pbs.twimg.com/media/GVeBPWoWQAAy5zr.jpg:large);
      background-size: cover;        /* cobre toda a área */
      background-position: center;   /* centraliza a imagem */
      min-height: 100vh;             /* garante 100% da altura da viewport */

    }

  </style>
<body>
    <div class="bg-img position-fixed top-0 start-0 w-100 h-100 object-fit-contain" style="background-image:url(https://pbs.twimg.com/media/GVeBPWoWQAAy5zr.jpg:large); background-size:cover; background-position:center; z-index:-1;">
    </div>
    <main>
    <section class="container">
        <div class="container-fluid mt-5" >
            <h1 style="color: rgb(255, 255, 255); ">Alisamento Militar Obrigatorio</h1>
        </div>
        <div class="col p-5 my-5 border bg-success text-white"  style="color: teal; font-family: 'Lucida Sans', 'Lucida Sans Regular';">
            <h1>Amar o Brasil é acreditar no poder do seu povo.</h1>
        </div>
        <div class="col p-5 my-5 border bg-primary text-white" style="color: olivedrab;">
            <H1>Com coragem e união, construímos uma nação mais forte.</H1>
        </div>
        <div class="col p-5 my-5 border bg-warning text-white"><h1>O verde e amarelo vive em cada coração que não desiste do Brasil.</h1>
        </div>
    </section>

    <section class="container-fluid">
        <div class="row">
            <div class="col p-5 my-5 border bg-success text-white text-center"  style="color: teal; font-family: 'Lucida Sans', 'Lucida Sans Regular';">
                <h1>Patria</h1>
            </div>
            <div class="col p-5 my-5 border bg-primary text-white text-center" style="color: olivedrab;">
                <H1>Amada</H1>
            </div>
            <div class="col p-5 my-5 border bg-warning text-white text-center"><h1>Brasil</h1>
            </div>
        </div>
    </section>
    <div class="container">
        <div class="row">
            <div class="col-md-3 border m-3"></div>
            <div class="col-md-9 border p-3 bg-secondary">
                <h1 class="display-1 text-white"> Display-1</h1>
                <h1 class="display-2 text-white"> Display-2</h1>
                <h1 class="display-3 text-white"> Display-3</h1>
                <h1 class="display-4 text-white"> Display-4</h1>
                <h1 class="display-5 text-white"> Display-5</h1>
            </div>
        </div>
    </div>
</main>
</body>
</html>
