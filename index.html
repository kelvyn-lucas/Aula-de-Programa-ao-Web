<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garibaldo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <h1>Olá!</h1>
    <h3>Bem vindo a cozinha da palmerinha</h3>
    <div>
        <p>Acesse o canal da palmerinha
            <a href="https://www.youtube.com/watch?v=RfCUO02nWGY" target="_blank"><i class="bi bi-youtube"
                    id="youtube"></i></a>
        </p>
    <div class="formulario">
    <form action="#" method="get">

        <label for="nome">Digite o seu nome.</label>
        <input id="nome" name="nome" type="text" placeholder="Dgite o seu nome aqui." required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Seu email aqui" required>

        <label for="periodo">Semestre da graduação</label>
        <input type="number" min="1" max="8" id="semestre" name="semestre" required>

        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" maxlength="8" minlength="6">

        <label for="placa">Placa dessa lata velha que vc chama de carro</label>
        <input type="text" pattern="[A-Z]{3}[0-9]{1}[A-Z]{1}[0-9]{2}" placeholder="AAA0A00">

        <label for="nasc">Data de Nacimento</label>
        <input type="date" name="nasc" id="nasc">

        <!-- Para enviar o formulaio todo -->
        <input type="submit" value="Salvar">
    </form>
    </div>
    </div>


</body>

</html>
