<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Aula de tabelas e CSS</h1>

    <table>
        <thead>
            <th>Leite</th>
            <th>de</th>
            <th>minha</th>
            <th>coperativa</th>
        </thead>
        <tbody>
            <tr>
                <td>Centro</td>
                <td>Coperativo</td>
                <td>de</td>
                <td>Produtores</td>
                <td>de</td>
                <td>Leite</td>
            </tr>
            <tr>
                <td>C</td>
                <td>C</td>
                <td>P</td>
                <td>L</td>
            </tr>
        </tbody>
        <tfoot>
            <th>Leite</th>
        </tfoot>
    </table>

    <p>Tabela com rowpan</p>

    <table>
        <tr>
            <th>Coluna 1</th> <th> Coluna 2</th>
        </tr>
        <tr>
            <td rowspan="2">Dado 1</td> <td>Dado 2</td>
        </tr>
        <tr>
            <td>Dado 3</td>
        </tr>
        <tr>
            <td>Dado teste</td>
        </tr>
    </table>

    <table>
        <tr>
            <th>Col1</th>
            <th>Col2</th>
        </tr>
        <tr>
            <td colspan="2">1</td>
        </tr>
        <tr>
            <td>3</td>
            <td>4</td>
        </tr>
    </table>

</body>
</html>
